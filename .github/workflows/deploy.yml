name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue deployments rather than cancelling one mid-flight — a cancelled Pages
# deployment surfaces as "Deployment failed, try again later" on the next run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # base path (/my-fiber-tracker/) lives in vite.config.ts
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url || steps.deployment-retry-2.outputs.page_url }}
    steps:
      # GitHub Pages' publish step fails transiently now and then
      # ("Deployment failed, try again later") — sometimes for several minutes.
      # Try up to three times with escalating waits so a flaky publish
      # self-heals instead of needing a manual re-run.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: sleep 120
      - id: deployment-retry-2
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
